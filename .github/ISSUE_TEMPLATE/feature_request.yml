name: Feature request
description: Propose a new capability or enhancement
title: "[feature] <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please explain the use case
        before the proposed implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish? Why is this a problem today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        A clear, concrete description of the desired behaviour. Include
        CLI flags, config keys, or API surface you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you rejected them.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - Schema introspection
        - Mapping config
        - CSV / JSONL transforms
        - Direct streaming pipeline
        - CDC (PostgreSQL logical replication)
        - Kafka consumer
        - Mapping studio UI
        - MCP server
        - CLI / ergonomics
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, etc.
    validations:
      required: false
