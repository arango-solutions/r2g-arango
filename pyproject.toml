[project]
name = "r2g"
version = "0.1.0"
description = "Relational to Graph (R2G) ETL Pipeline"
requires-python = ">=3.10"
dependencies = [
    "typer[all]>=0.9.0",
    "psycopg[binary]>=3.1.0",
    "python-arango>=7.5.0",
    "pydantic>=2.5.0",
    "rich>=13.0.0",
    "polars>=1.0.0",
    "pyyaml>=6.0",
    "structlog>=24.1.0",
]

[project.optional-dependencies]
test = ["pytest>=8.0", "pytest-cov>=5.0"]

[project.scripts]
r2g = "r2g.main:app"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
