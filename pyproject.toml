[project]
name = "r2g"
version = "0.1.0"
description = "Relational to Graph (R2G) ETL Pipeline"
requires-python = ">=3.10"
dependencies = [
    "typer[all]>=0.15.0",
    "psycopg[binary]>=3.1.0",
    "python-arango>=7.5.0",
    "pydantic>=2.5.0",
    "rich>=13.0.0",
    "polars>=1.0.0",
    "pyyaml>=6.0",
    "structlog>=24.1.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
kafka = ["confluent-kafka>=2.3.0"]
ui = ["fastapi>=0.110.0", "uvicorn[standard]>=0.27.0", "httpx>=0.27.0"]
test = ["pytest>=8.0", "pytest-cov>=5.0"]
dev = ["ruff>=0.4"]

[project.scripts]
r2g = "r2g.main:app"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires live PostgreSQL and ArangoDB (deselect with -m 'not integration')",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"src/r2g/generators/visualizer.py" = ["E501"]
